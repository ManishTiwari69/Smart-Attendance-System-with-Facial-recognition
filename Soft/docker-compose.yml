version: "3.9"

# ── SmartHospital Docker Compose ──────────────────────────────────────────────
# Starts: PostgreSQL + Backend API + (optionally) Frontend dev server
#
# Usage:
#   docker-compose up --build
#   docker-compose up --build -d   # detached
#
# After first start, seed the DB:
#   docker-compose exec backend python scripts/seed_db.py

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     smarthospital
      POSTGRES_PASSWORD: smarthospital_dev_pw
      POSTGRES_DB:       smarthospital_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarthospital"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV:       development
      FLASK_DEBUG:     "1"
      DATABASE_URL:    postgresql://smarthospital:smarthospital_dev_pw@db:5432/smarthospital_db
      SECRET_KEY:      dev-secret-change-in-production-min-64-chars
      JWT_SECRET_KEY:  dev-jwt-secret-change-in-production
      FRONTEND_ORIGIN: http://localhost:3000
      FACE_STORE_PATH: /app/face_store
      REPORT_UPLOAD_PATH: /app/uploads/reports
    volumes:
      - ./uploads:/app/uploads
      - ./face_store:/app/face_store
      - .:/app   # live reload in dev
    ports:
      - "5000:5000"
    command: python run.py

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  # Uncomment to run frontend in Docker too
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     VITE_API_URL: http://localhost:5000/api
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
